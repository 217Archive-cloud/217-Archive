kind = "web"
previewPath = "/"
title = "2:17 AM"
version = "1.0.0"
id = "artifacts/literary-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21509

[services.development]
run = "pnpm --filter @workspace/literary-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/literary-site", "run", "build" ]
publicDir = "artifacts/literary-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21509"
BASE_PATH = "/"
